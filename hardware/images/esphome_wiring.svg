<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="380" fill="white"/>

  <!-- Power in -->
  <rect x="20" y="150" width="110" height="50" rx="6" fill="#eef" stroke="#333"/>
  <text x="75" y="180" text-anchor="middle" font-size="14">H2 (+5V in)</text>

  <!-- LM317 -->
  <rect x="180" y="150" width="120" height="50" rx="6" fill="#eef" stroke="#333"/>
  <text x="240" y="172" text-anchor="middle" font-size="13">U1 LM317</text>
  <text x="240" y="188" text-anchor="middle" font-size="11" fill="#555">R1/R2 -&gt; ~3.3V</text>

  <!-- D1 -->
  <rect x="350" y="150" width="80" height="50" rx="6" fill="#eef" stroke="#333"/>
  <text x="390" y="180" text-anchor="middle" font-size="13">D1 SS34</text>

  <!-- H1 -->
  <rect x="480" y="150" width="110" height="50" rx="6" fill="#eef" stroke="#333"/>
  <text x="535" y="180" text-anchor="middle" font-size="14">H1 (reg. out)</text>

  <!-- Load -->
  <rect x="640" y="150" width="150" height="50" rx="6" fill="#ffe9cc" stroke="#333"/>
  <text x="715" y="180" text-anchor="middle" font-size="13">Spray motor /</text>
  <text x="715" y="194" text-anchor="middle" font-size="13">solenoid load</text>

  <line x1="130" y1="175" x2="180" y2="175" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="175" x2="350" y2="175" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="430" y1="175" x2="480" y2="175" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="590" y1="175" x2="640" y2="175" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ESP32-C3 -->
  <rect x="330" y="270" width="160" height="60" rx="6" fill="#e6ffe6" stroke="#2a7a2a"/>
  <text x="410" y="296" text-anchor="middle" font-size="14">ESP32-C3</text>
  <text x="410" y="314" text-anchor="middle" font-size="11" fill="#555">(ESPHome)</text>

  <!-- GPIO to Q1 gate -->
  <line x1="490" y1="290" x2="600" y2="290" stroke="#2a7a2a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="545" y="278" text-anchor="middle" font-size="11" fill="#2a7a2a">GPIOx (confirm on board)</text>

  <!-- Q1 -->
  <rect x="600" y="260" width="90" height="60" rx="6" fill="#eef" stroke="#333"/>
  <text x="645" y="286" text-anchor="middle" font-size="13">Q1</text>
  <text x="645" y="302" text-anchor="middle" font-size="11" fill="#555">AO3400A</text>

  <!-- Q1 switches load return to GND -->
  <line x1="715" y1="200" x2="715" y2="230" stroke="#333" stroke-width="2"/>
  <line x1="715" y1="230" x2="645" y2="230" stroke="#333" stroke-width="2"/>
  <line x1="645" y1="230" x2="645" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="680" y="222" text-anchor="middle" font-size="11" fill="#555">load return</text>

  <line x1="645" y1="320" x2="645" y2="350" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="645" y="365" text-anchor="middle" font-size="12">GND</text>

  <!-- R3 pulldown -->
  <line x1="600" y1="290" x2="570" y2="290" stroke="#333" stroke-width="1.5"/>
  <line x1="570" y1="290" x2="570" y2="340" stroke="#333" stroke-width="1.5"/>
  <text x="570" y="355" text-anchor="middle" font-size="11" fill="#555">R3 10k -&gt; GND</text>
</svg>
